syntax = "proto3";

package kiapi.board.commands;

import "google/protobuf/any.proto";
import "common/types/base_types.proto";
import "common/types/enums.proto";
import "common/types/project_settings.proto";
import "board/board.proto";
import "board/board_types.proto";

/*
 * Board stackup and properties
 */

message GetBoardStackup
{
  kiapi.common.types.DocumentSpecifier board = 1;
}

message BoardStackupResponse
{
  kiapi.board.BoardStackup stackup = 1;
}

// Changes the stackup for the given board according to the contents of the message (**not yet implemented**)
// WARNING: any existing content on layers that are removed by this call is deleted.  This operation cannot be undone.
// Returns BoardStackupResponse with the updated stackup, in normalized form
message UpdateBoardStackup
{
  kiapi.common.types.DocumentSpecifier board = 1;
  kiapi.board.BoardStackup stackup = 2;
}

message GetBoardEnabledLayers
{
  kiapi.common.types.DocumentSpecifier board = 1;
}

message BoardEnabledLayersResponse
{
  // The number of copper layers enabled in this board.
  uint32 copper_layer_count = 1;

  // A list of all layers enabled in this board, including copper layers and ones which cannot be disabled.
  repeated kiapi.board.types.BoardLayer layers = 2;
}

// Changes which layers are enabled in the board stackup
// WARNING: any existing content on layers that are removed by this call is deleted.  This operation cannot be undone.
// Returns BoardEnabledLayersResponse with the updated layer set.
message SetBoardEnabledLayers
{
  kiapi.common.types.DocumentSpecifier board = 1;

  // The number of copper layers to enable in the board.  Currently, this must be an even number >= 2.
  uint32 copper_layer_count = 2;

  // The non-copper layers to enable.  Note that any copper layers in this list are ignored; copper layers are enabled
  // by setting copper_layer_count.  Note that the F/B.Courtyard, Edge.Cuts, and Margin layers cannot be disabled and
  // will be present in the board even if they are omitted from this list.
  repeated kiapi.board.types.BoardLayer layers = 3;
}

/*
 * Board layer info (name, type, enabled state)
 */

// Layer type for copper layers (matches LAYER_T enum in KiCad)
enum BoardLayerType
{
  BLT_UNDEFINED = 0;
  BLT_SIGNAL = 1;     // Signal layer (default for copper)
  BLT_POWER = 2;      // Power plane
  BLT_MIXED = 3;      // Mixed signal/power
  BLT_JUMPER = 4;     // Jumper layer
  BLT_AUX = 5;        // Auxiliary (for non-copper layers)
  BLT_FRONT = 6;      // Front layer
  BLT_BACK = 7;       // Back layer
}

// Information about a single board layer
message BoardLayerInfo
{
  // The layer ID
  kiapi.board.types.BoardLayer layer = 1;

  // The canonical layer name (e.g., "F.Cu", "B.Silkscreen")
  string name = 2;

  // User-customized layer name (empty if using default)
  string user_name = 3;

  // Layer type (primarily for copper layers)
  BoardLayerType type = 4;

  // Whether the layer is enabled
  bool enabled = 5;

  // Whether the layer is visible in the editor
  bool visible = 6;
}

// Get information about all board layers
// Returns BoardLayersInfoResponse
message GetBoardLayersInfo
{
  kiapi.common.types.DocumentSpecifier board = 1;
}

message BoardLayersInfoResponse
{
  // Number of copper layers
  uint32 copper_layer_count = 1;

  // All layer information
  repeated BoardLayerInfo layers = 2;
}

// Set a layer's custom name
// Returns Empty
message SetLayerName
{
  kiapi.common.types.DocumentSpecifier board = 1;

  // The layer to rename
  kiapi.board.types.BoardLayer layer = 2;

  // The new custom name (empty string to reset to default)
  string name = 3;
}

// Set a layer's type (for copper layers)
// Returns Empty
message SetLayerType
{
  kiapi.common.types.DocumentSpecifier board = 1;

  // The layer to modify (must be a copper layer)
  kiapi.board.types.BoardLayer layer = 2;

  // The new layer type
  BoardLayerType type = 3;
}

message GetGraphicsDefaults
{
  kiapi.common.types.DocumentSpecifier board = 1;
}

message GraphicsDefaultsResponse
{
  kiapi.board.GraphicsDefaults defaults = 1;
}

enum BoardOriginType
{
  BOT_UNKNOWN = 0;
  BOT_GRID = 1;
  BOT_DRILL = 2;
}

// Returns a Vector2 with the specified origin point
message GetBoardOrigin
{
  kiapi.common.types.DocumentSpecifier board = 1;

  BoardOriginType type = 2;
}

message SetBoardOrigin
{
  kiapi.common.types.DocumentSpecifier board = 1;

  BoardOriginType type = 2;

  kiapi.common.types.Vector2 origin = 3;
}

/*
 * Net management
 */

message GetNets
{
  kiapi.common.types.DocumentSpecifier board = 1;

  // If provided, will only return nets that belong to the given netclass.
  // If more than one netclass_filter is given, nets belonging to any of the given classes will
  // be returned.
  repeated string netclass_filter = 2;
}

message NetsResponse
{
  repeated kiapi.board.types.Net nets = 1;
}

// Retrieve all the copper items belonging to a certain net or set of nets
// returns kiapi.common.commands.GetItemsResponse
message GetItemsByNet
{
  // Specifies which document to query, which fields to return, etc.
  kiapi.common.types.ItemHeader header = 1;

  // List of one or more types of items to retreive
  repeated kiapi.common.types.KiCadObjectType types = 2;

  // A list of net codes to filter items by
  repeated kiapi.board.types.NetCode net_codes = 3;
}

// Retrieve all the copper items belonging to a certain net class or set of net classes
// returns kiapi.common.commands.GetItemsResponse
message GetItemsByNetClass
{
  // Specifies which document to query, which fields to return, etc.
  kiapi.common.types.ItemHeader header = 1;

  // List of one or more types of items to retreive
  repeated kiapi.common.types.KiCadObjectType types = 2;

  // A list of net class names to filter items by
  repeated string net_classes = 3;
}

// A net may be part of multiple classes that have a priority ordering, which will result in a
// composite "effective" netclass containing the merged/overridden properties of all the constituent
// netclasses it contains.  This message retrieves this effective netclass for a net or list of
// nets.
// Returns NetClassForNetsResponse
message GetNetClassForNets
{
  repeated kiapi.board.types.Net net = 1;
}

message NetClassForNetsResponse
{
  // Map of net name to netclass info
  map<string, kiapi.common.project.NetClass> classes = 1;
}

/*
 * Blocking operations
 */

// Refills some or all zones on the board.
// This is a blocking operation; it will return Empty immediately, but KiCad will return
// ApiStatusCode.AS_BUSY to all future API requests until the zone fill has completed.
message RefillZones
{
  kiapi.common.types.DocumentSpecifier board = 1;

  // A list of zones to refill.  If empty, all zones are refilled.
  repeated kiapi.common.types.KIID zones = 2;
}

/*
 * Utilities
 */

// Computes the polygon representation of a pad, merging any custom shapes together.
// This representation will approximate curves as a series of segments.
message GetPadShapeAsPolygon
{
  // The board to process
  kiapi.common.types.DocumentSpecifier board = 1;

  // A list of one or more pads to process
  repeated kiapi.common.types.KIID pads = 2;

  // The layer to process
  kiapi.board.types.BoardLayer layer = 3;
}

// Returned from GetPadShapeAsPolygon.  The pads and polygons repeated fields will have the same length
// and can be treated as a list of tuples.
message PadShapeAsPolygonResponse
{
  // The pads that were processed
  repeated kiapi.common.types.KIID pads = 1;

  // The polygon representation of each pad
  repeated kiapi.common.types.PolygonWithHoles polygons = 2;
}

// Tests if the given set of items with padstacks (pads or vias) has content on the given set of layers.
// This is a dynamic call rather than a property of the padstack because pads and vias can be set to only include
// shapes on connected copper layers, and whether or not the pad is connected can't be determined in isolation.
// To optimize API call performance, multiple items and multiple layers to test may be passed in with this
// command message.  The return will include the results for each valid item on each valid layer.
// Note that not all layers make sense for a given item (for example, testing against BL_UNDEFINED never makes
// sense).  In general, the internal KiCad APIs will not return an error when testing non-sensical layers for a given
// item, and instead will return a default of "true" for any such layers.
message CheckPadstackPresenceOnLayers
{
  kiapi.common.types.DocumentSpecifier board = 1;

  repeated kiapi.common.types.KIID items = 2;

  repeated kiapi.board.types.BoardLayer layers = 3;
}

enum PadstackPresence
{
  PSP_UNKNOWN = 0;
  PSP_PRESENT = 1;      // The padstack has a shape on a given layer (is flashed)
  PSP_NOT_PRESENT = 2;  // The padstack has no shape on a given layer (is not flashed)
}

message PadstackPresenceEntry
{
  kiapi.common.types.KIID item = 1;
  kiapi.board.types.BoardLayer layer = 2;
  PadstackPresence presence = 3;
}

message PadstackPresenceResponse
{
  repeated PadstackPresenceEntry entries = 1;
}

// DRC markers

enum DrcSeverity // Since 10.0
{
  DRS_UNKNOWN = 0;
  DRS_WARNING = 1;
  DRS_ERROR = 2;
  DRS_EXCLUSION = 3;
  DRS_IGNORE = 4;
  DRS_INFO = 5;
  DRS_ACTION = 6;
  DRS_DEBUG = 7;
  DRS_UNDEFINED = 8;
}

// Returns InjectDrcErrorResponse
message InjectDrcError
{
  kiapi.common.types.DocumentSpecifier board = 1;

  DrcSeverity severity = 2;

  string message = 3;

  kiapi.common.types.Vector2 position = 4;

  repeated kiapi.common.types.KIID items = 5;
}

message InjectDrcErrorResponse
{
  kiapi.common.types.KIID marker = 1;
}

// PCB editor commands

// returns BoardLayers
message GetVisibleLayers
{
  kiapi.common.types.DocumentSpecifier board = 1;
}

message BoardLayerResponse
{
  kiapi.board.types.BoardLayer layer = 1;
}

message BoardLayers
{
  repeated kiapi.board.types.BoardLayer layers = 1;
}

message SetVisibleLayers
{
  kiapi.common.types.DocumentSpecifier board = 1;

  repeated kiapi.board.types.BoardLayer layers = 2;
}

// returns BoardLayerResponse
message GetActiveLayer
{
  kiapi.common.types.DocumentSpecifier board = 1;
}

message SetActiveLayer
{
  kiapi.common.types.DocumentSpecifier board = 1;

  kiapi.board.types.BoardLayer layer = 2;
}

enum InactiveLayerDisplayMode
{
  ILDM_UNKNOWN = 0;
  // Inactive layers are shown
  ILDM_NORMAL = 1;
  // Inactive layers are shown with dimmed colors
  ILDM_DIMMED = 2;
  // Inactive layers are hidden
  ILDM_HIDDEN = 3;
}

enum NetColorDisplayMode
{
  NCDM_UNKNOWN = 0;
  // Net and netclass colors are shown in the ratsnest and on all copper items
  NCDM_ALL = 1;
  // Net and netclass colors are shown in the ratsnest only
  NCDM_RATSNEST = 2;
  // Net and netclass colors are not shown
  NCDM_OFF = 3;
}

enum BoardFlipMode
{
  BFM_UNKNOWN = 0;
  // Normal ("non-flipped") mode
  BFM_NORMAL = 1;
  // "Flipped" mode, viewed from the back and mirrored around the X axis
  BFM_FLIPPED_X = 2;
}

enum RatsnestDisplayMode
{
  RDM_UNKNOWN = 0;
  // Ratsnest lines are drawn to objects even if they are on hidden layers
  RDM_ALL_LAYERS = 1;
  // Ratsnest lines are hidden when at least one endpoint is an item on a hidden layer
  RDM_VISIBLE_LAYERS = 2;
}

message BoardEditorAppearanceSettings
{
  InactiveLayerDisplayMode inactive_layer_display = 1;

  NetColorDisplayMode net_color_display = 2;

  BoardFlipMode board_flip = 3;

  RatsnestDisplayMode ratsnest_display = 4;
}

// Returns BoardEditorAppearanceSettings
message GetBoardEditorAppearanceSettings
{
}

message SetBoardEditorAppearanceSettings
{
  BoardEditorAppearanceSettings settings = 1;
}

//// Interactive commands ////
// These commands begin an interactive operation in the editor.
// They return a response immediately, but the editor will become busy
// and will not reply to further API commands until the user has finished
// the operation.
// These commands will return an error if received in a non-interactive context.

// Selects and begins an interactive move of the given item(s).
// NOTE: Takes ownership of the active commit, if one exists:
//       the move tool will push the commit when the user confirms the move,
//       or roll back the commit if the user cancels the move.  Keep this in
//       mind if using this command in combination with commands that create
//       or modify items using an explicit commit.
message InteractiveMoveItems
{
  kiapi.common.types.DocumentSpecifier board = 1;

  repeated kiapi.common.types.KIID items = 2;
}

// Shows a diff overlay on the board editor for testing purposes.
// The overlay will be shown at the specified bounding box location.
// If no bounding box is provided, uses the board's bounding box.
message ShowDiffOverlay
{
  kiapi.common.types.DocumentSpecifier board = 1;

  // Optional bounding box for the overlay. If not provided or has zero size,
  // the board's bounding box will be used.
  kiapi.common.types.Box2 bounding_box = 2;
}

/*
 * DRC (Design Rule Check) Operations
 */

// Run design rule checks on the board.
// This is a blocking operation; returns when DRC is complete.
// Returns RunDRCResponse with summary of violations found.
message RunDRC
{
  kiapi.common.types.DocumentSpecifier board = 1;

  // If true, refill all zones before running DRC
  bool refill_zones = 2;

  // If true, report all track errors (not just the first per track)
  bool report_all_track_errors = 3;

  // If true, test footprints against library footprints
  bool test_footprints = 4;
}

message RunDRCResponse
{
  // Number of errors found
  int32 error_count = 1;

  // Number of warnings found
  int32 warning_count = 2;

  // Number of exclusions (user-marked items to ignore)
  int32 exclusion_count = 3;
}

// Get all current DRC violations/markers from the board
// Returns DRCViolationsResponse
message GetDRCViolations
{
  kiapi.common.types.DocumentSpecifier board = 1;

  // Optional: filter by severity (if empty, returns all)
  repeated DrcSeverity severities = 2;
}

// Represents a single DRC violation
message DRCViolation
{
  // The marker ID
  kiapi.common.types.KIID id = 1;

  // Severity of the violation
  DrcSeverity severity = 2;

  // Error type/code
  int32 error_code = 3;

  // Human-readable error type name
  string error_type = 4;

  // Detailed error message
  string message = 5;

  // Position of the violation marker
  kiapi.common.types.Vector2 position = 6;

  // IDs of items involved in the violation
  repeated kiapi.common.types.KIID items = 7;
}

message DRCViolationsResponse
{
  repeated DRCViolation violations = 1;
}

// Clear DRC markers from the board
// Returns Empty
message ClearDRCMarkers
{
  kiapi.common.types.DocumentSpecifier board = 1;

  // If true, clear errors and warnings
  bool clear_violations = 2;

  // If true, clear exclusions (user-marked items to ignore)
  bool clear_exclusions = 3;
}

/*
 * Design Rules
 */

// Board design rules/constraints
message BoardDesignRules
{
  // Copper clearances (in nanometers)
  int64 min_clearance = 1;
  int64 min_track_width = 2;
  int64 min_connection = 3;  // For zone connections

  // Via constraints
  int64 min_via_diameter = 4;
  int64 min_via_drill = 5;
  int64 min_via_annular_width = 6;

  // Microvia constraints
  int64 min_microvia_diameter = 7;
  int64 min_microvia_drill = 8;

  // Hole constraints
  int64 min_through_hole = 9;
  int64 min_hole_to_hole = 10;
  int64 hole_to_copper_clearance = 11;

  // Silkscreen
  int64 min_silk_clearance = 12;
  int64 min_silk_text_height = 13;
  int64 min_silk_text_thickness = 14;

  // Board edge
  int64 copper_edge_clearance = 15;

  // Solder mask
  int64 solder_mask_expansion = 16;
  int64 solder_mask_min_width = 17;
  int64 solder_mask_to_copper_clearance = 18;
  bool allow_soldermask_bridges_in_fps = 22;
  bool tent_vias_front = 23;
  bool tent_vias_back = 24;

  // Solder paste
  int64 solder_paste_margin = 19;
  double solder_paste_margin_ratio = 20;

  // Minimum resolved spokes for thermals
  int32 min_resolved_spokes = 21;

  // Arc/Circle Approximations
  int64 max_error = 25;  // Maximum allowed deviation when approximating arcs/circles (nm)

  // Zone Fill Strategy
  bool allow_external_fillets = 26;  // Allow fillets/chamfers outside zone outline

  // Length Tuning
  bool include_stackup_in_length = 27;  // Include stackup height in track length calculations
}

// Get design rules
// Returns DesignRulesResponse
message GetDesignRules
{
  kiapi.common.types.DocumentSpecifier board = 1;
}

message DesignRulesResponse
{
  BoardDesignRules rules = 1;
}

// Set design rules
// Returns DesignRulesResponse with the updated rules
message SetDesignRules
{
  kiapi.common.types.DocumentSpecifier board = 1;
  BoardDesignRules rules = 2;
}

/*
 * DRC Settings
 */

// DRC check severity setting
message DRCCheckSeverity
{
  string check_name = 1;      // DRC check name (e.g., "clearance", "track_width")
  DrcSeverity severity = 2;   // Severity level
}

// DRC settings configuration
message DRCSettingsData
{
  // Severity overrides for individual DRC checks
  repeated DRCCheckSeverity check_severities = 1;
}

// Get DRC settings
// Returns DRCSettingsResponse
message GetDRCSettings
{
  kiapi.common.types.DocumentSpecifier board = 1;
}

message DRCSettingsResponse
{
  DRCSettingsData settings = 1;
}

// Set DRC settings
// Returns Empty
message SetDRCSettings
{
  kiapi.common.types.DocumentSpecifier board = 1;
  DRCSettingsData settings = 2;
}

/*
 * Grid Settings
 */

// Grid style enum
enum GridStyle
{
  GS_UNKNOWN = 0;
  GS_DOTS = 1;
  GS_LINES = 2;
  GS_SMALL_CROSS = 3;
}

// PCB grid settings
message PCBGridSettings
{
  int64 grid_size_x_nm = 1;   // Grid X spacing in nanometers
  int64 grid_size_y_nm = 2;   // Grid Y spacing in nanometers
  bool show_grid = 3;
  GridStyle style = 4;
}

// Get PCB grid settings
// Returns PCBGridSettingsResponse
message GetPCBGridSettings
{
  kiapi.common.types.DocumentSpecifier board = 1;
}

message PCBGridSettingsResponse
{
  PCBGridSettings settings = 1;
}

// Set PCB grid settings
// Returns Empty
message SetPCBGridSettings
{
  kiapi.common.types.DocumentSpecifier board = 1;
  optional int64 grid_size_x_nm = 2;   // Grid X spacing in nanometers
  optional int64 grid_size_y_nm = 3;   // Grid Y spacing in nanometers
  optional bool show_grid = 4;
  optional GridStyle style = 5;
}

/*
 * Graphics Defaults (Set)
 */

// Set default graphics settings per layer class
// Returns GraphicsDefaultsResponse with the updated defaults
message SetGraphicsDefaults
{
  kiapi.common.types.DocumentSpecifier board = 1;
  kiapi.board.GraphicsDefaults defaults = 2;
}

/*
 * Update PCB from Schematic
 */

// Options for updating PCB from schematic
message UpdatePCBFromSchematicOptions
{
  // Footprint matching strategy: true = match by UUID, false = match by reference
  bool lookup_by_timestamp = 1;

  // Footprint handling
  bool replace_footprints = 2;        // Replace footprints when library ID doesn't match
  bool delete_unused_footprints = 3;  // Remove footprints not in schematic
  bool override_locks = 4;            // Allow changes to locked footprints

  // Field synchronization
  bool update_fields = 5;             // Sync custom field values from schematic
  bool remove_extra_fields = 6;       // Remove fields not present in schematic

  // Groups (design blocks)
  bool transfer_groups = 7;           // Copy group membership from schematic
}

// Request to update PCB from schematic
// Returns UpdatePCBFromSchematicResponse
message UpdatePCBFromSchematic
{
  kiapi.common.types.DocumentSpecifier board = 1;

  // If not specified, uses the schematic associated with the board's project
  kiapi.common.types.DocumentSpecifier schematic = 2;

  UpdatePCBFromSchematicOptions options = 3;

  // If true, only preview changes without applying
  bool dry_run = 4;
}

// Single change item in the update report
message PCBUpdateChange
{
  enum ChangeType
  {
    CT_UNKNOWN = 0;
    CT_FOOTPRINT_ADDED = 1;
    CT_FOOTPRINT_REPLACED = 2;
    CT_FOOTPRINT_DELETED = 3;
    CT_FOOTPRINT_UPDATED = 4;       // Fields/value changed
    CT_NET_CHANGED = 5;
    CT_PAD_NET_CHANGED = 6;
    CT_GROUP_ADDED = 7;
    CT_WARNING = 8;
    CT_ERROR = 9;
  }

  ChangeType type = 1;
  string reference = 2;              // Component reference (U1, R5, etc.)
  string message = 3;                // Human-readable description
  kiapi.common.types.KIID item_id = 4; // Affected item ID (if applicable)
}

// Response from UpdatePCBFromSchematic
message UpdatePCBFromSchematicResponse
{
  kiapi.common.types.CommandStatus status = 1;

  // Summary counts
  int32 footprints_added = 2;
  int32 footprints_replaced = 3;
  int32 footprints_deleted = 4;
  int32 footprints_updated = 5;
  int32 nets_changed = 6;
  int32 warnings = 7;
  int32 errors = 8;

  // Detailed change log
  repeated PCBUpdateChange changes = 9;

  // true if update was applied (false for dry_run)
  bool changes_applied = 10;
}

/*
 * Footprint Library Browsing
 */

// Basic footprint metadata
message FootprintInfo
{
  string name = 1;              // Footprint name (e.g., "R_0402_1005Metric")
  string lib_id = 2;            // Full lib_id (e.g., "Resistor_SMD:R_0402_1005Metric")
  string description = 3;       // Description text
  string keywords = 4;          // Keywords for searching
  int32 pad_count = 5;          // Number of pads
  int32 unique_pad_count = 6;   // Unique pad shapes
}

// Pad information for detailed footprint view
message PadInfo
{
  string number = 1;                   // Pad number/name
  string net_name = 2;                 // Net name (empty for library footprint)
  kiapi.common.types.Vector2 position = 3;  // Relative position
  kiapi.common.types.Vector2 size = 4;      // Pad size
  int32 shape = 5;                     // PAD_SHAPE enum
}

// Get all footprints in a library
// Returns GetLibraryFootprintsResponse
message GetLibraryFootprints
{
  string library_name = 1;  // Library nickname (e.g., "Resistor_SMD")
}

message GetLibraryFootprintsResponse
{
  repeated FootprintInfo footprints = 1;
}

// Search footprints across libraries
// Returns SearchLibraryFootprintsResponse
message SearchLibraryFootprints
{
  string query = 1;                    // Search term
  repeated string libraries = 2;       // Libraries to search (empty = all)
  int32 max_results = 3;               // Limit results (0 = unlimited)
}

message SearchLibraryFootprintsResponse
{
  repeated FootprintInfo results = 1;
}

// Get detailed footprint info
// Returns GetFootprintInfoResponse
message GetFootprintInfo
{
  string lib_id = 1;  // "Library:Footprint" format
}

message GetFootprintInfoResponse
{
  FootprintInfo info = 1;
  repeated PadInfo pads = 2;           // Pad details
  kiapi.common.types.Box2 bounding_box = 3;  // Footprint bounds
  string doc_link = 4;                 // Documentation URL
}

/*
 * Ratsnest Query
 */

// Individual ratsnest line (unrouted connection)
message RatsnestLine
{
  int32 net_code = 1;
  string net_name = 2;
  kiapi.common.types.KIID pad1_id = 3;    // Source pad/via
  kiapi.common.types.KIID pad2_id = 4;    // Destination pad/via
  kiapi.common.types.Vector2 start = 5;    // Start position
  kiapi.common.types.Vector2 end = 6;      // End position
  int64 length = 7;                        // Manhattan distance (nm)
}

// Get unrouted connections (ratsnest lines)
// Returns GetRatsnestResponse
message GetRatsnest
{
  kiapi.common.types.DocumentSpecifier board = 1;
  repeated int32 net_codes = 2;        // Filter by nets (empty = all)
  bool include_zones = 3;              // Include zone connections
}

message GetRatsnestResponse
{
  repeated RatsnestLine lines = 1;
  int32 total_unrouted = 2;            // Total unrouted count
}

// Information about unrouted nets
message UnroutedNetInfo
{
  int32 net_code = 1;
  string net_name = 2;
  int32 total_pads = 3;                // Total pads on net
  int32 routed_connections = 4;        // Completed connections
  int32 unrouted_connections = 5;      // Remaining connections
  bool is_complete = 6;                // Fully routed?
}

// Get nets with incomplete routing
// Returns GetUnroutedNetsResponse
message GetUnroutedNets
{
  kiapi.common.types.DocumentSpecifier board = 1;
}

message GetUnroutedNetsResponse
{
  repeated UnroutedNetInfo nets = 1;
}

// Connectivity status for a single item
message ItemConnectivity
{
  kiapi.common.types.KIID item_id = 1;
  int32 net_code = 2;
  string net_name = 3;
  repeated kiapi.common.types.KIID connected_items = 4;   // Items electrically connected
  repeated kiapi.common.types.KIID unconnected_items = 5; // Items on same net but not connected
}

// Get connectivity status for specific items
// Returns GetConnectivityStatusResponse
message GetConnectivityStatus
{
  kiapi.common.types.DocumentSpecifier board = 1;
  repeated kiapi.common.types.KIID item_ids = 2;    // Pads/vias to check
}

message GetConnectivityStatusResponse
{
  repeated ItemConnectivity items = 1;
}

