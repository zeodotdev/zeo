syntax = "proto3";

package kiapi.schematic.types;

import "common/types/base_types.proto";

enum SchematicLayer
{
  SL_UNKNOWN = 0;
}

/// Represents a schematic line segment, which may be a wire, bus, or graphical line
message Line
{
  kiapi.common.types.KIID    id     = 1;
  kiapi.common.types.Vector2 start  = 2;
  kiapi.common.types.Vector2 end    = 3;

  /**
   * One of: LAYER_BUS, LAYER_WIRE, LAYER_NOTES
   */
  SchematicLayer layer = 4;
}

message Text
{
  kiapi.common.types.Text text = 1;
}

message LocalLabel
{
  kiapi.common.types.KIID    id       = 1;
  kiapi.common.types.Vector2 position = 2;
  Text                       text     = 3;
}

message GlobalLabel
{
  kiapi.common.types.KIID    id       = 1;
  kiapi.common.types.Vector2 position = 2;
  Text                       text     = 3;
}

message HierarchicalLabel
{
  kiapi.common.types.KIID    id       = 1;
  kiapi.common.types.Vector2 position = 2;
  Text                       text     = 3;
}

message DirectiveLabel
{
  kiapi.common.types.KIID    id       = 1;
  kiapi.common.types.Vector2 position = 2;
  Text                       text     = 3;
}

message Pin
{
  kiapi.common.types.KIID              id          = 1;
  kiapi.common.types.Vector2           position    = 2;
  kiapi.common.types.Angle             angle       = 3;
  string                               name        = 4;
  string                               number      = 5;
  kiapi.common.types.ElectricalPinType electrical_type = 6;
}

message Field
{
  kiapi.common.types.KIID           id         = 1;
  kiapi.common.types.Vector2        position   = 2;
  kiapi.common.types.TextAttributes attributes = 3;
  string                            text       = 4;
  string                            name       = 5;
  int32                             id_int     = 6;
}

message Symbol
{
  kiapi.common.types.KIID              id                 = 1;
  kiapi.common.types.Vector2           position           = 2;
  kiapi.common.types.Angle             angle              = 3;
  bool                                 mirror_x           = 4;
  bool                                 mirror_y           = 5;
  kiapi.common.types.LibraryIdentifier lib_id             = 6;
  int32                                unit               = 7;
  bool                                 dnp                = 8;
  bool                                 exclude_from_bom   = 9;
  bool                                 exclude_from_board = 10;
  bool                                 exclude_from_sim   = 11;

  repeated Field                       fields             = 12;
  repeated Pin                         pins               = 13;
}
