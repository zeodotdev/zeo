<!DOCTYPE html>
<html class="h-full bg-[#1E1E1E] flex flex-col-reverse overflow-y-auto"><head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                'bg-primary': '#1E1E1E',
                'bg-secondary': '#2d2d2d',
                'bg-tertiary': '#3d3d3d',
                'text-primary': '#FFFFFF',
                'text-secondary': '#d4d4d4',
                'text-muted': '#808080',
                'accent-blue': '#569cd6',
                'accent-green': '#4ec9b0',
                'accent-red': '#f44747',
                'code-orange': '#ce9178',
                'border-dark': '#404040',
            },
            fontFamily: {
                'sans': ['-apple-system', 'BlinkMacSystemFont', 'Segoe WPC', 'Segoe UI', 'Ubuntu', 'Droid Sans', 'sans-serif'],
                'mono': ['Menlo', 'Monaco', 'Courier New', 'monospace'],
            },
        }
    }
}
</script>
<style>
/* Immediate background to prevent white flash on load */
html { background: #1E1E1E !important; }
body { background: #1E1E1E !important; }

/* Dark scrollbar styling for WebKit */
::-webkit-scrollbar {
    width: 12px;
    background: #1E1E1E;
}
::-webkit-scrollbar-track {
    background: #1E1E1E;
}
::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 6px;
    border: 2px solid #1E1E1E;
}
::-webkit-scrollbar-thumb:hover {
    background: #666;
}

/* Thinking content toggle state */
.thinking-content { display: none; }
.thinking-content.expanded { display: block; }

/* Code block styling for highlight.js */
pre code.hljs {
    background: #2d2d2d;
    padding: 12px;
    border-radius: 6px;
    font-family: Menlo, Monaco, 'Courier New', monospace;
    font-size: 13px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
}
pre.code-block {
    background: #2d2d2d;
    padding: 12px;
    border-radius: 6px;
    font-family: Menlo, Monaco, 'Courier New', monospace;
    font-size: 13px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
    color: #d4d4d4;
    margin: 12px 0;
}
</style>
<script>
function sendMsg(action, data) {
    const msg = JSON.stringify({action, ...data});
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.agent) {
        window.webkit.messageHandlers.agent.postMessage(msg);
    } else if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(msg);
    } else {
        console.error('[AGENT] No message handler available!');
    }
}
function clickLink(href) {
    sendMsg('link_click', {href: href});
    return false;
}
document.addEventListener('contextmenu', function(e) {
    const sel = window.getSelection().toString();
    if (sel) {
        sendMsg('copy', {text: sel});
    }
});

// Handle all link clicks with event delegation
document.addEventListener('click', function(e) {
    // Check if clicked element is a link or inside a link
    let target = e.target;
    while (target && target.tagName !== 'A') {
        target = target.parentElement;
    }

    if (target && target.tagName === 'A') {
        const href = target.getAttribute('href');

        // Handle thinking toggles in JavaScript (no page reload)
        if (href && href.startsWith('toggle:thinking:')) {
            e.preventDefault();
            const index = target.getAttribute('data-thinking-index');
            const content = document.querySelector('.thinking-content[data-thinking-index="' + index + '"]');

            if (content) {
                const oldDisplay = content.style.display;
                const newDisplay = (oldDisplay === 'none' || oldDisplay === '') ? 'block' : 'none';
                const expanded = (newDisplay === 'block');

                // Update DOM immediately
                content.style.display = newDisplay;

                // Send message to C++
                sendMsg('thinking_toggled', {index: parseInt(index), expanded: expanded});
            } else {
                console.error('[AGENT] No thinking content found for index:', index);
            }
            return false;
        }

        // Handle other links (tool approval, external links, etc.)
        if (href && href !== '#') {
            e.preventDefault();
            clickLink(href);
        }
    }
});

// Highlight all code blocks in an element
function highlightCodeBlocks(element) {
    if (typeof hljs !== 'undefined') {
        element.querySelectorAll('pre code').forEach((block) => {
            if (!block.classList.contains('hljs')) {
                hljs.highlightElement(block);
            }
        });
    }
}

// Incremental DOM update for streaming - called from C++ via RunScript()
function updateStreamingContent(html) {
    const container = document.getElementById('streaming-content');
    if (container) {
        container.innerHTML = html;
        highlightCodeBlocks(container);
    } else {
        console.error('[AGENT] streaming-content container not found!');
    }
}

// Finalize streaming content - removes ID so next streaming uses fresh div
function finalizeStreamingContent() {
    const container = document.getElementById('streaming-content');
    if (container) {
        container.removeAttribute('id');
    }
}

// Append content incrementally (used by AppendHtml)
function appendToChat(html) {
    const wrapper = document.querySelector('.content-wrapper');
    if (wrapper) {
        // Create a temporary container to parse the HTML
        const temp = document.createElement('div');
        temp.innerHTML = html;
        // Highlight code blocks in the new content
        highlightCodeBlocks(temp);
        // Append each child to the wrapper
        while (temp.firstChild) {
            wrapper.appendChild(temp.firstChild);
        }
    }
}

// Highlight all code blocks on page load (for SetPage reloads)
document.addEventListener('DOMContentLoaded', function() {
    highlightCodeBlocks(document.body);
});
</script>
</head>
<body class="h-full m-0 p-0 bg-bg-primary text-text-primary font-sans text-[13px] leading-relaxed flex flex-col-reverse overflow-y-auto">
<div class="content-wrapper p-2.5">
