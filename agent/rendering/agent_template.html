<!DOCTYPE html>
<html class="h-full bg-[#1E1E1E] flex flex-col-reverse overflow-y-auto"><head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                'bg-primary': '#1E1E1E',
                'bg-secondary': '#2d2d2d',
                'bg-tertiary': '#3d3d3d',
                'text-primary': '#FFFFFF',
                'text-secondary': '#d4d4d4',
                'text-muted': '#808080',
                'accent-blue': '#569cd6',
                'accent-green': '#4ec9b0',
                'accent-red': '#f44747',
                'code-orange': '#ce9178',
                'border-dark': '#404040',
            },
            fontFamily: {
                'sans': ['-apple-system', 'BlinkMacSystemFont', 'Segoe WPC', 'Segoe UI', 'Ubuntu', 'Droid Sans', 'sans-serif'],
                'mono': ['Menlo', 'Monaco', 'Courier New', 'monospace'],
            },
        }
    }
}
</script>
<style>
/* Immediate background to prevent white flash on load */
html { background: #1E1E1E !important; }
body { background: #1E1E1E !important; }

/* Dark scrollbar styling for WebKit */
::-webkit-scrollbar {
    width: 12px;
    background: #1E1E1E;
}
::-webkit-scrollbar-track {
    background: #1E1E1E;
}
::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 6px;
    border: 2px solid #1E1E1E;
}
::-webkit-scrollbar-thumb:hover {
    background: #666;
}

/* Thinking content toggle state */
.thinking-content { display: none; }
.thinking-content.expanded { display: block; }

/* Generic collapsible toggle */
.toggle-chevron {
    display: inline-block;
    transition: transform 0.15s ease;
    font-size: 10px;
    color: #808080;
}
.toggle-chevron.expanded { transform: rotate(90deg); }

/* Tool result collapsible styles */
.tool-result-header { cursor: pointer; user-select: none; }
.tool-result-header:hover { opacity: 0.8; }

/* Code block styling for highlight.js */
pre code.hljs {
    background: #2d2d2d;
    padding: 12px;
    border-radius: 6px;
    font-family: Menlo, Monaco, 'Courier New', monospace;
    font-size: 13px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
}
pre.code-block {
    background: #2d2d2d;
    padding: 12px;
    border-radius: 6px;
    font-family: Menlo, Monaco, 'Courier New', monospace;
    font-size: 13px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
    color: #d4d4d4;
    margin: 12px 0;
}

/* Table styling */
table {
    border-collapse: collapse;
    width: 100%;
    margin: 12px 0;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #404040;
}
th {
    background: #3d3d3d;
    color: #ffffff;
    font-weight: 600;
    text-align: left;
    padding: 10px 12px;
    border-bottom: 2px solid #569cd6;
}
td {
    background: #2d2d2d;
    color: #d4d4d4;
    padding: 8px 12px;
    border-bottom: 1px solid #404040;
}
tr:last-child td {
    border-bottom: none;
}
tr:hover td {
    background: #363636;
}
img[src^="data:"] {
    cursor: pointer;
}
</style>
<script>
function sendMsg(action, data) {
    const msg = JSON.stringify({action, ...data});
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.agent) {
        window.webkit.messageHandlers.agent.postMessage(msg);
    } else if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(msg);
    } else {
        console.error('[AGENT] No message handler available!');
    }
}
function clickLink(href) {
    sendMsg('link_click', {href: href});
    return false;
}
document.addEventListener('contextmenu', function(e) {
    // Right-click on an image: copy image to clipboard via C++
    if (e.target.tagName === 'IMG' && e.target.src.startsWith('data:')) {
        e.preventDefault();
        sendMsg('copy_image', {src: e.target.src});
        return;
    }
    const sel = window.getSelection().toString();
    if (sel) {
        sendMsg('copy', {text: sel});
    }
});

// Handle all link clicks with event delegation
document.addEventListener('click', function(e) {
    // Click on a data: image: open native preview
    if (e.target.tagName === 'IMG' && e.target.src.startsWith('data:')) {
        e.preventDefault();
        sendMsg('preview_image', {src: e.target.src});
        return;
    }

    // Click on a document preview: open in system viewer
    let docEl = e.target.closest('.doc-preview[data-file-base64]');
    if (docEl) {
        e.preventDefault();
        sendMsg('preview_file', {
            base64: docEl.getAttribute('data-file-base64'),
            filename: docEl.getAttribute('data-file-name') || 'document.pdf'
        });
        return;
    }

    // Check if clicked element is a link or inside a link
    let target = e.target;
    while (target && target.tagName !== 'A') {
        target = target.parentElement;
    }

    if (target && target.tagName === 'A') {
        const href = target.getAttribute('href');

        // Handle all toggle links: toggle:thinking:0, toggle:toolresult:0, etc.
        if (href && href.startsWith('toggle:')) {
            e.preventDefault();
            const parts = href.split(':');
            if (parts.length === 3) {
                const type = parts[1];
                const index = parts[2];
                const content = document.querySelector('[data-toggle-type="' + type + '"][data-toggle-index="' + index + '"]');
                const chevron = target.querySelector('.toggle-chevron');

                if (content) {
                    const expanded = content.style.display === 'none' || content.style.display === '';
                    content.style.display = expanded ? 'block' : 'none';
                    if (chevron) chevron.classList.toggle('expanded', expanded);
                    sendMsg(type + '_toggled', {index: parseInt(index), expanded: expanded});
                }
            }
            return false;
        }

        // Handle other links (tool approval, external links, etc.)
        if (href && href !== '#') {
            e.preventDefault();
            clickLink(href);
        }
    }
});

// Highlight all code blocks in an element
function highlightCodeBlocks(element) {
    if (typeof hljs !== 'undefined') {
        element.querySelectorAll('pre code').forEach((block) => {
            if (!block.classList.contains('hljs')) {
                hljs.highlightElement(block);
            }
        });
    }
}

// Incremental DOM update for streaming - called from C++ via RunScript()
function updateStreamingContent(html) {
    const container = document.getElementById('streaming-content');
    if (container) {
        container.innerHTML = html;
        highlightCodeBlocks(container);
    } else {
        console.error('[AGENT] streaming-content container not found!');
    }
}

// Finalize streaming content - removes ID so next streaming uses fresh div
function finalizeStreamingContent() {
    const container = document.getElementById('streaming-content');
    if (container) {
        container.removeAttribute('id');
    }
}

// Append content incrementally (used by AppendHtml)
function appendToChat(html) {
    const wrapper = document.querySelector('.content-wrapper');
    if (wrapper) {
        // Create a temporary container to parse the HTML
        const temp = document.createElement('div');
        temp.innerHTML = html;
        // Highlight code blocks in the new content
        highlightCodeBlocks(temp);
        // Append each child to the wrapper
        while (temp.firstChild) {
            wrapper.appendChild(temp.firstChild);
        }
    }
}

// Highlight all code blocks on page load (for SetPage reloads)
document.addEventListener('DOMContentLoaded', function() {
    highlightCodeBlocks(document.body);
});
</script>
</head>
<body class="h-full m-0 p-0 bg-bg-primary text-text-primary font-sans text-[13px] leading-relaxed flex flex-col-reverse overflow-y-auto">
<div class="content-wrapper p-2.5">
