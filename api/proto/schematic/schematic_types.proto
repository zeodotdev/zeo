syntax = "proto3";

package kiapi.schematic.types;

import "common/types/base_types.proto";

enum SchematicLayer
{
  SL_UNKNOWN = 0;
}

/// Represents a schematic line segment, which may be a wire, bus, or graphical line
message Line
{
  kiapi.common.types.KIID    id     = 1;
  kiapi.common.types.Vector2 start  = 2;
  kiapi.common.types.Vector2 end    = 3;

  /**
   * One of: LAYER_BUS, LAYER_WIRE, LAYER_NOTES
   */
  SchematicLayer layer = 4;
}

/// Represents a junction (connection point) in the schematic
message Junction
{
  kiapi.common.types.KIID    id       = 1;
  kiapi.common.types.Vector2 position = 2;
  int32                      diameter = 3;  // In nanometers, 0 for default
  uint32                     color    = 4;  // RGBA color, 0 for default
}

/// Represents a no-connect marker in the schematic
message NoConnect
{
  kiapi.common.types.KIID    id       = 1;
  kiapi.common.types.Vector2 position = 2;
}

/// A schematic-specific text object (SCH_TEXT)
message Text
{
  kiapi.common.types.KIID id = 1;
  kiapi.common.types.Text text = 2;
  SchematicLayer layer = 3;
}

/// A schematic-specific textbox object (SCH_TEXTBOX)
message TextBox
{
  kiapi.common.types.KIID id = 1;
  kiapi.common.types.TextBox text_box = 2;
  SchematicLayer layer = 3;
}

/// A schematic-specific graphic shape (SCH_SHAPE)
message SchematicGraphicShape
{
  kiapi.common.types.KIID id = 1;
  kiapi.common.types.GraphicShape shape = 2;
  SchematicLayer layer = 3;
}

message LocalLabel
{
  kiapi.common.types.KIID    id       = 1;
  kiapi.common.types.Vector2 position = 2;
  kiapi.common.types.Text    text     = 3;
}

message GlobalLabel
{
  kiapi.common.types.KIID    id       = 1;
  kiapi.common.types.Vector2 position = 2;
  kiapi.common.types.Text    text     = 3;
}

message HierarchicalLabel
{
  kiapi.common.types.KIID    id       = 1;
  kiapi.common.types.Vector2 position = 2;
  kiapi.common.types.Text    text     = 3;
}

message DirectiveLabel
{
  kiapi.common.types.KIID    id       = 1;
  kiapi.common.types.Vector2 position = 2;
  kiapi.common.types.Text    text     = 3;
}

/// Represents a bitmap/image in the schematic
message Bitmap
{
  kiapi.common.types.KIID    id       = 1;
  kiapi.common.types.Vector2 position = 2;  // Position of the image center
  double                     scale    = 3;  // Scale factor (1.0 = original size)
  bytes                      data     = 4;  // Image data (PNG format)
}

/// Represents a table cell in the schematic
message TableCell
{
  kiapi.common.types.KIID id       = 1;
  string                  text     = 2;
  int32                   col_span = 3;  // Number of columns this cell spans
  int32                   row_span = 4;  // Number of rows this cell spans
}

/// Represents a table in the schematic
message Table
{
  kiapi.common.types.KIID    id          = 1;
  kiapi.common.types.Vector2 position    = 2;
  int32                      columns     = 3;  // Number of columns
  int32                      rows        = 4;  // Number of rows
  repeated TableCell         cells       = 5;
  bool                       header_on   = 6;  // Whether first row is a header
  int32                      col_width   = 7;  // Default column width in nm
  int32                      row_height  = 8;  // Default row height in nm
}

/// Represents a group of schematic items
message SchematicGroup
{
  kiapi.common.types.KIID  id       = 1;
  string                   name     = 2;       // Group name
  repeated kiapi.common.types.KIID members = 3; // IDs of grouped items
  bool                     locked   = 4;       // Whether the group is locked
}

/// Type of bus entry
enum BusEntryType
{
  BET_UNKNOWN     = 0;
  BET_WIRE_TO_BUS = 1;  // Connects a wire to a bus
  BET_BUS_TO_BUS  = 2;  // Connects a bus to another bus
}

/// Represents a bus entry (wire-to-bus or bus-to-bus connection point)
message BusEntry
{
  kiapi.common.types.KIID    id       = 1;
  kiapi.common.types.Vector2 position = 2;  // Start position
  kiapi.common.types.Vector2 size     = 3;  // Size/offset to end position
  BusEntryType               type     = 4;

  // Stroke properties
  int32                      width    = 5;  // Line width in nm, 0 for default
  uint32                     color    = 6;  // RGBA color, 0 for default

  // Dangling state (read-only, set by connectivity analysis)
  bool                       start_dangling = 7;
  bool                       end_dangling   = 8;
}

message Pin
{
  kiapi.common.types.KIID              id          = 1;
  kiapi.common.types.Vector2           position    = 2;
  kiapi.common.types.Angle             angle       = 3;
  string                               name        = 4;
  string                               number      = 5;
  kiapi.common.types.ElectricalPinType electrical_type = 6;
}

message Field
{
  kiapi.common.types.KIID           id         = 1;
  kiapi.common.types.Vector2        position   = 2;
  kiapi.common.types.TextAttributes attributes = 3;
  string                            text       = 4;
  string                            name       = 5;
  int32                             id_int     = 6;
}

message Symbol
{
  kiapi.common.types.KIID              id                 = 1;
  kiapi.common.types.Vector2           position           = 2;
  kiapi.common.types.Angle             angle              = 3;
  bool                                 mirror_x           = 4;
  bool                                 mirror_y           = 5;
  kiapi.common.types.LibraryIdentifier lib_id             = 6;
  int32                                unit               = 7;
  bool                                 dnp                = 8;
  bool                                 exclude_from_bom   = 9;
  bool                                 exclude_from_board = 10;
  bool                                 exclude_from_sim   = 11;

  repeated Field                       fields             = 12;
  repeated Pin                         pins               = 13;
}

/// Represents which side of a sheet a pin is attached to
enum SheetPinSide
{
  SPS_UNKNOWN = 0;
  SPS_LEFT    = 1;
  SPS_RIGHT   = 2;
  SPS_TOP     = 3;
  SPS_BOTTOM  = 4;
}

/// Shape of a hierarchical label or sheet pin
enum LabelShape
{
  LS_UNKNOWN     = 0;
  LS_INPUT       = 1;
  LS_OUTPUT      = 2;
  LS_BIDI        = 3;
  LS_TRISTATE    = 4;
  LS_UNSPECIFIED = 5;
}

/// Represents a sheet pin (hierarchical connection point on a sheet)
message SheetPin
{
  kiapi.common.types.KIID    id       = 1;
  string                     name     = 2;
  kiapi.common.types.Vector2 position = 3;
  SheetPinSide               side     = 4;
  LabelShape                 shape    = 5;
}

/// Represents a hierarchical sheet in the schematic
message Sheet
{
  kiapi.common.types.KIID      id                   = 1;
  kiapi.common.types.Vector2   position             = 2;
  kiapi.common.types.Vector2   size                 = 3;
  string                       name                 = 4;
  string                       filename             = 5;
  string                       page_number          = 6;
  bool                         dnp                  = 7;
  bool                         exclude_from_bom     = 8;
  bool                         exclude_from_board   = 9;
  bool                         exclude_from_sim     = 10;
  kiapi.common.types.Distance  border_width         = 11;
  kiapi.common.types.Color     border_color         = 12;
  kiapi.common.types.Color     background_color     = 13;
  repeated SheetPin            pins                 = 14;
  repeated Field               fields               = 15;
}
